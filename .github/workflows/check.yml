name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  portability:
    name: Portability and budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No dependencies to install: the checker is zero-dependency, stdlib only.
      - name: Run the portability and budget check
        run: npm run check
